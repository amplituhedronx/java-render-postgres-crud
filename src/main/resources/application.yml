server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update        # Use 'validate' or 'none' in production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
