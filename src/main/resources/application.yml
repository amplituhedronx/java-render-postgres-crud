server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_URL#*//}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
